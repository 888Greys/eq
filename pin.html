<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN - Equity Mobile</title>
    <style>
        :root {
            --primary: #8c1d1b;
            --bg: #1e1b18;
            --text: #ffffff;
            --keypad-bg: #262422;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            animation: fadeInBody 0.6s ease-out;
        }

        @keyframes fadeInBody {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background-color: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 500px) {
            .mobile-container {
                height: 90vh;
                border-radius: 30px;
            }
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 5px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #aaa;
            text-align: center;
            margin-bottom: 40px;
        }

        .pin-display {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
        }

        .pin-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 2px solid #555;
            transition: all 0.2s;
        }

        .pin-dot.filled {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: scale(1.2);
        }

        .keypad {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 20px 40px;
        }

        .key {
            aspect-ratio: 1.5;
            background-color: var(--keypad-bg);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }

        .key:active {
            background-color: #383633;
            transform: scale(0.95);
        }

        .key.empty {
            background: none;
            cursor: default;
        }

        .key.delete svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-message.visible {
            opacity: 1;
        }

        .loader {
            display: none;
            margin-top: 20px;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='1st.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <div style="font-weight: 600;">PIN Entry</div>
            <div style="width: 34px;"></div>
        </div>

        <div class="content">
            <h1 class="title">Enter your PIN</h1>
            <p class="subtitle">Please enter your secret 4-digit PIN to continue</p>

            <div class="pin-display">
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
                <div class="pin-dot"></div>
            </div>

            <div class="loader" id="loader"></div>
            <div class="error-message" id="errorMessage">Incorrect PIN. Please try again.</div>
        </div>

        <div class="keypad">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
            <div class="key empty"></div>
            <button class="key">0</button>
            <button class="key delete">
                <svg viewBox="0 0 24 24">
                    <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                    <line x1="18" y1="9" x2="12" y2="15" />
                    <line x1="12" y1="9" x2="18" y2="15" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dots = document.querySelectorAll('.pin-dot');
            const keys = document.querySelectorAll('.key:not(.empty)');
            const loader = document.getElementById('loader');
            const errorMessage = document.getElementById('errorMessage');
            let pin = "";

            function updateDots() {
                dots.forEach((dot, index) => {
                    dot.classList.toggle('filled', index < pin.length);
                });
            }

            keys.forEach(key => {
                key.addEventListener('click', () => {
                    if (key.classList.contains('delete')) {
                        pin = pin.slice(0, -1);
                        errorMessage.classList.remove('visible');
                    } else if (pin.length < 4) {
                        pin += key.textContent;
                    }

                    updateDots();

                    if (pin.length === 4) {
                        // Simulate verification
                        loader.style.display = 'block';
                        document.querySelector('.keypad').style.pointerEvents = 'none';

                        setTimeout(() => {
                            if (pin === "1234") { // Dummy correct PIN
                                window.location.href = 'otp.html';
                            } else {
                                loader.style.display = 'none';
                                errorMessage.classList.add('visible');
                                pin = "";
                                updateDots();
                                document.querySelector('.keypad').style.pointerEvents = 'auto';
                            }
                        }, 1000);
                    }
                });
            });
        });
    </script>
</body>

</html>
