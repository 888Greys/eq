<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Loan - Application</title>
    <style>
        :root {
            --primary: #8c1d1b;
            --bg: #f8f9fa;
            --card: #ffffff;
            --grey: #f0f0f0;
            --text-grey: #666;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            animation: fadeInBody 0.6s ease-out;
        }

        @keyframes fadeInBody {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body {
            background-color: var(--bg);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #eee;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--primary);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .progress-bar {
            height: 4px;
            background: #eee;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 33%;
            transition: width 0.3s ease;
        }

        .content {
            padding: 24px;
            flex: 1;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: #8c1d1b;
        }

        input,
        select {
            width: 100%;
            padding: 16px;
            background: #fdfdfd;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #8c1d1b;
            box-shadow: 0 0 0 4px rgba(140, 29, 27, 0.05);
        }

        input.error {
            border-color: #ff4d4d;
            background-color: #fffafa;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 12px;
            margin-top: -18px;
            margin-bottom: 18px;
            display: none;
        }

        .footer {
            padding: 24px;
            display: flex;
            gap: 12px;
            background: white;
            border-top: 1px solid #eee;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn-secondary {
            background: var(--grey);
            color: #333;
        }

        .summary-card {
            background: #fdf2f2;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .summary-label {
            color: #666;
        }

        .summary-value {
            font-weight: 700;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" id="globalBack">←</button>
            <h1 id="stepTitle">Loan Application</h1>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="content">
            <!-- Step 1: Loan Details -->
            <div class="step active" id="step1">
                <div class="form-group">
                    <label>Loan Type</label>
                    <select id="loanType">
                        <option>Personal Loan</option>
                        <option>Business Loan</option>
                        <option>Emergency Loan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Loan Amount (KSh)</label>
                    <input type="number" id="loanAmount" placeholder="Enter amount">
                </div>
                <div class="form-group">
                    <label>Loan Term</label>
                    <select id="loanTerm">
                        <option value="12">12 Months</option>
                        <option value="24">24 Months</option>
                        <option value="36">36 Months</option>
                        <option value="48">48 Months</option>
                        <option value="60">60 Months</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Purpose of Loan</label>
                    <input type="text" id="loanPurpose" placeholder="What will you use the loan for?">
                </div>
            </div>

            <!-- Step 2: Personal Information -->
            <div class="step" id="step2">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="Enter first name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter last name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Enter phone number">
                </div>
            </div>

            <!-- Step 3: Employment & Summary -->
            <div class="step" id="step3">
                <div class="form-group">
                    <label>Employment Status</label>
                    <select id="employmentStatus">
                        <option>Employed</option>
                        <option>Self-Employed</option>
                        <option>Unemployed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Annual Income (KSh)</label>
                    <input type="number" id="annualIncome" placeholder="Enter annual income">
                </div>

                <h3 style="font-size: 16px; margin: 20px 0 10px;">Application Summary</h3>
                <div class="summary-card">
                    <div class="summary-item">
                        <span class="summary-label">Loan Amount:</span>
                        <span class="summary-value" id="summaryAmount">KSh 0</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Loan Term:</span>
                        <span class="summary-value" id="summaryTerm">0 months</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Purpose:</span>
                        <span class="summary-value" id="summaryPurpose">-</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Applicant:</span>
                        <span class="summary-value" id="summaryName">-</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn btn-secondary" id="prevBtn" style="display: none;">PREVIOUS</button>
            <button class="btn btn-primary" id="nextBtn">NEXT STEP</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        const steps = [
            document.getElementById('step1'),
            document.getElementById('step2'),
            document.getElementById('step3')
        ];
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const progressFill = document.getElementById('progressFill');
        const globalBack = document.getElementById('globalBack');

        // Preload data from local storage if coming from calculator
        window.addEventListener('load', () => {
            const savedAmount = localStorage.getItem('loanAmount');
            const savedTerm = localStorage.getItem('loanTerm');
            if (savedAmount) document.getElementById('loanAmount').value = savedAmount;
            if (savedTerm) document.getElementById('loanTerm').value = savedTerm;
        });

        function updateUI() {
            steps.forEach((s, idx) => {
                s.classList.toggle('active', idx === currentStep - 1);
            });

            prevBtn.style.display = currentStep > 1 ? 'block' : 'none';
            nextBtn.textContent = currentStep === totalSteps ? 'SUBMIT' : 'NEXT STEP';
            progressFill.style.width = (currentStep / totalSteps) * 100 + '%';

            if (currentStep === 3) {
                updateSummary();
            }
        }

        function updateSummary() {
            const amount = document.getElementById('loanAmount').value;
            const term = document.getElementById('loanTerm').value;
            const purpose = document.getElementById('loanPurpose').value;
            const fname = document.getElementById('firstName').value;
            const lname = document.getElementById('lastName').value;

            document.getElementById('summaryAmount').textContent = `KSh ${parseFloat(amount).toLocaleString()}`;
            document.getElementById('summaryTerm').textContent = `${term} months`;
            document.getElementById('summaryPurpose').textContent = purpose || 'N/A';
            document.getElementById('summaryName').textContent = `${fname} ${lname}`;
        }

        function validateStep() {
            const currentStepEl = steps[currentStep - 1];
            const inputs = currentStepEl.querySelectorAll('input, select');
            let isValid = true;

            inputs.forEach(input => {
                if (input.tagName === 'INPUT' && !input.value.trim()) {
                    input.classList.add('error');
                    isValid = false;
                } else {
                    input.classList.remove('error');
                }
            });

            if (!isValid) {
                // Shake effect or feedback could go here
                return false;
            }
            return true;
        }

        nextBtn.addEventListener('click', () => {
            if (!validateStep()) return;

            if (currentStep < totalSteps) {
                currentStep++;
                updateUI();
            } else {
                // Final submission
                nextBtn.disabled = true;
                nextBtn.innerHTML = '<div class="loading-spinner"></div>';
                setTimeout(() => {
                    window.location.href = 'ai_studio_code (1).html';
                }, 1500);
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentStep > 1) {
                currentStep--;
                updateUI();
            }
        });

        globalBack.addEventListener('click', () => {
            if (currentStep === 1) {
                window.location.href = 'calculator.html';
            } else {
                currentStep--;
                updateUI();
            }
        });

        updateUI();
    </script>
</body>

</html>
