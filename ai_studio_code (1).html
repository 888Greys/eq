<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Mobile Welcome</title>
    <style>
        /* --- Base Reset --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* --- Mobile Responsive Container --- */
        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background: linear-gradient(135deg, #8c1d1b 0%, #6e1614 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Responsive check for larger screens */
        @media (min-width: 500px) {
            .mobile-container {
                height: 90vh;
                border-radius: 30px;
            }
        }

        /* --- Background Pattern (Faceted geometric look) --- */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .shape-dark {
            position: absolute;
            bottom: -10%;
            left: -20%;
            width: 150%;
            height: 60%;
            background: linear-gradient(to top right, rgba(0, 0, 0, 0.1), transparent);
            transform: rotate(-15deg);
            clip-path: polygon(0 0, 100% 100%, 0 100%);
        }

        .shape-light {
            position: absolute;
            top: -20%;
            right: -30%;
            width: 150%;
            height: 80%;
            background: linear-gradient(to bottom left, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(25deg);
            clip-path: polygon(100% 0, 100% 100%, 0 0);
        }

        .shape-dark-2 {
            position: absolute;
            top: 30%;
            right: -10%;
            width: 80%;
            height: 40%;
            background-color: rgba(0, 0, 0, 0.04);
            clip-path: polygon(100% 0, 0 100%, 100% 100%);
        }

        /* --- Top System Status Bar --- */
        /* --- App Header --- */
        .app-header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        /* Language Selector */
        .lang-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .globe-icon {
            width: 20px;
            height: 20px;
            stroke: #fff;
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chevron-down {
            width: 16px;
            height: 16px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Help Icon */
        .help-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-icon {
            width: 26px;
            height: 26px;
            stroke: #fff;
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- Main Center Content --- */
        .main-content {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            margin-top: -40px;
            /* Slight optical adjustment to center better between header and buttons */
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
        }

        .equity-logo-svg {
            width: 110px;
            height: auto;
            margin-bottom: 8px;
        }

        .brand-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2.5px;
            font-family: Arial, Helvetica, sans-serif;
            /* Fallback for solid geometric look */
        }

        /* Text Content */
        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .welcome-subtitle {
            font-size: 16px;
            text-align: center;
            font-weight: 400;
            opacity: 0.95;
            padding: 0 10px;
        }

        /* --- Bottom Action Buttons --- */
        .bottom-actions {
            position: relative;
            z-index: 10;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Both buttons in this specific view are white */
        .btn-white {
            background-color: #ffffff;
            color: #8c1d1b;
            /* Text matches background red */
        }

        /* --- Android Navigation Bar --- */
        .nav-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            background-color: #ffffff;
            /* White nav bar as in screenshot */
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: #666;
            /* Grey icons */
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>

    <div class="mobile-container">

        <!-- Background Faceted Pattern -->
        <div class="bg-pattern">
            <div class="shape-light"></div>
            <div class="shape-dark"></div>
            <div class="shape-dark-2"></div>
        </div>


        <!-- Header -->
        <div class="app-header">
            <!-- Language Selector -->
            <div class="lang-selector">
                <svg class="globe-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path
                        d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                    </path>
                </svg>
                <span>Eng</span>
                <svg class="chevron-down" viewBox="0 0 24 24">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>

            <!-- Help/Support Icon -->
            <button class="help-btn">
                <svg class="chat-icon" viewBox="0 0 24 24">
                    <!-- Chat Bubble Outline -->
                    <path
                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">

            <!-- Logo -->
            <div class="logo-container">
                <!-- Custom SVG to mimic the Equity Bank house shape -->
                <svg class="equity-logo-svg" viewBox="0 0 100 35" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Main continuous path for the roof shape -->
                    <path d="M0 32 L0 15 L18 15 L50 0 L100 24 L100 32 L50 8 L22 21 L22 32 Z" fill="#ffffff" />
                </svg>
                <div class="brand-text">EQUITY</div>
            </div>

            <!-- Welcome Text -->
            <h1 class="welcome-title">Welcome to<br>Equity mobile</h1>
            <p class="welcome-subtitle">Good evening! Sign in or register to continue</p>

        </div>

        <!-- Bottom Actions -->
        <div class="bottom-actions">
            <button class="action-btn btn-white" id="btn-signin">Sign in</button>
            <button class="action-btn btn-white" id="btn-register">Register</button>
        </div>

        <!-- System Navigation Bar -->
        <div class="nav-bar">
            <!-- Back -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M10 9l-4 4 4 4m-4-4h9a4 4 0 0 0 4-4V5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <!-- Home -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="7" fill="none" stroke="#666" stroke-width="2" />
            </svg>
            <!-- Recent -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <line x1="4" y1="8" x2="20" y2="8" />
                <line x1="4" y1="16" x2="20" y2="16" />
            </svg>
        </div>

    </div>

    <script>
        // Simple interactions for visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const signinBtn = document.getElementById('btn-signin');
            const registerBtn = document.getElementById('btn-register');

            signinBtn.addEventListener('click', () => {
                console.log("Sign in clicked");
                // Add slight opacity pulse effect
                signinBtn.style.opacity = '0.7';
                setTimeout(() => {
                    signinBtn.style.opacity = '1';
                    window.location.href = '1st.html';
                }, 150);
            });

            registerBtn.addEventListener('click', () => {
                console.log("Register clicked");
                // Add slight opacity pulse effect
                registerBtn.style.opacity = '0.7';
                setTimeout(() => {
                    registerBtn.style.opacity = '1';
                    window.location.href = '1st.html';
                }, 150);
            });
        });
    </script>

</body>

</html>
