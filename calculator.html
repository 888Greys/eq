<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Loan - Calculator</title>
    <style>
        :root {
            --primary: #8c1d1b;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 30px 24px;
            text-align: left;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.4;
        }

        .content {
            padding: 24px;
            flex: 1;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .amount-display {
            font-size: 20px;
            color: var(--primary);
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }

        .payment-card {
            background: #fdf2f2;
            border: 1px solid #f9dcdc;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 24px;
        }

        .payment-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .payment-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .apply-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .apply-btn:active {
            filter: brightness(0.9);
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .feature-item {
            text-align: center;
            flex: 1;
        }

        .feature-icon {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .feature-text {
            font-size: 11px;
            font-weight: 600;
        }

        .feature-subtext {
            font-size: 9px;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Get Your Loan Approved Fast</h1>
            <p>Quick approval • Competitive rates • Flexible terms</p>
        </div>

        <div class="content">
            <h2 class="section-title">Loan Calculator</h2>

            <div class="input-group">
                <div class="label-row">
                    <span>Loan Amount</span>
                    <span class="amount-display" id="amountVal">$5,000</span>
                </div>
                <input type="range" id="amountRange" min="100" max="5000" step="50" value="5000">
                <div class="range-labels">
                    <span>$100</span>
                    <span>$5,000</span>
                </div>
            </div>

            <div class="input-group">
                <div class="label-row">
                    <span>Loan Term</span>
                    <span class="amount-display" id="termVal">12 months</span>
                </div>
                <input type="range" id="termRange" min="6" max="60" step="6" value="12">
                <div class="range-labels">
                    <span>6 months</span>
                    <span>60 months</span>
                </div>
            </div>

            <div class="payment-card">
                <div class="payment-label">Monthly Payment</div>
                <div class="payment-value" id="monthlyPayment">$434.94</div>
            </div>

            <button class="apply-btn" id="applyNow">APPLY NOW</button>

            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-text">Fast Approval</div>
                    <div class="feature-subtext">Within 24 hours</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💰</div>
                    <div class="feature-text">Low Rates</div>
                    <div class="feature-subtext">From 8%</div>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-text">Secure</div>
                    <div class="feature-subtext">Bank-level</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const amountRange = document.getElementById('amountRange');
        const termRange = document.getElementById('termRange');
        const amountDisplay = document.getElementById('amountVal');
        const termDisplay = document.getElementById('termVal');
        const monthlyDisplay = document.getElementById('monthlyPayment');
        const applyBtn = document.getElementById('applyNow');

        function calculatePayment() {
            const amount = parseFloat(amountRange.value);
            const months = parseInt(termRange.value);
            const rate = 0.08 / 12; // 8% annual rate

            // P * (r * (1 + r)^n) / ((1 + r)^n - 1)
            const payment = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);

            amountDisplay.textContent = `$${amount.toLocaleString()}`;
            termDisplay.textContent = `${months} months`;
            monthlyDisplay.textContent = `$${payment.toFixed(2)}`;
        }

        amountRange.addEventListener('input', calculatePayment);
        termRange.addEventListener('input', calculatePayment);

        applyBtn.addEventListener('click', () => {
            // Store data for application
            localStorage.setItem('loanAmount', amountRange.value);
            localStorage.setItem('loanTerm', termRange.value);
            window.location.href = 'apply.html';
        });

        calculatePayment();
    </script>
</body>

</html>
