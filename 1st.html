<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back Login</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            animation: fadeInBody 0.6s ease-out;
        }

        @keyframes fadeInBody {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        /* --- Mobile Responsive Container --- */
        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background-color: #1e1b18;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* Responsive check for larger screens */
        @media (min-width: 500px) {
            .mobile-container {
                height: 90vh;
                border-radius: 30px;
            }
        }


        /* --- Header --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            flex-grow: 1;
            text-align: center;
        }

        /* --- Main Content Area --- */
        .content {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }

        /* Greeting Section */
        .greeting-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .greeting-desc {
            font-size: 15px;
            color: #cccccc;
            line-height: 1.5;
            margin-bottom: 35px;
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 30px;
        }

        .input-label {
            display: block;
            font-size: 14px;
            color: #9e9c99;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
            border-bottom: 1px solid #4a4846;
            padding-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: #9e9c99;
        }

        .input-icon-right {
            position: absolute;
            right: 0;
            cursor: pointer;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            padding: 0;
        }

        /* Specific Icons */
        .chevron-icon {
            width: 20px;
            height: 20px;
            stroke: #ffffff;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .eye-icon {
            width: 24px;
            height: 24px;
            stroke: #ff6b6b;
            /* Exact pink/red color from image */
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Forgot Password Link */
        .forgot-link {
            display: inline-block;
            color: #ff6b6b;
            text-decoration: none;
            font-size: 14px;
            margin-top: 5px;
            font-weight: 500;
        }

        /* --- Bottom Action Area --- */
        .bottom-action {
            padding: 20px 24px 15px 24px;
        }

        .action-container {
            background-color: #262422;
            /* Darker container around button */
            border-radius: 12px;
            padding: 4px;
        }

        .sign-in-btn {
            width: 100%;
            padding: 16px;
            background-color: #383633;
            /* Disabled grey state */
            color: #9e9c99;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: default;
            transition: all 0.3s;
        }

        .sign-in-btn.active {
            background-color: #8c1d1b;
            color: #ffffff;
            cursor: pointer;
        }

        .sign-in-btn.active:active {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- Android Nav Bar --- */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            background-color: #171513;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            stroke: #888;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>

    <div class="mobile-container">


        <!-- Header -->
        <div class="header">
            <button class="icon-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <div class="header-title">Welcome back</div>
            <button class="icon-btn">
                <!-- Chat icon approximation -->
                <svg viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"></path>
                    <line x1="9" y1="9" x2="15" y2="9"></line>
                    <line x1="9" y1="13" x2="15" y2="13"></line>
                </svg>
            </button>
        </div>

        <!-- Main Content -->
        <div class="content">
            <h1 class="greeting-title">Hello there,</h1>
            <p class="greeting-desc">
                Sign in to continue. Remember, your password is yours, do not share it with anyone.
            </p>

            <div class="form">

                <!-- Country Input Group -->
                <div class="input-group">
                    <label class="input-label">Country</label>
                    <div class="input-wrapper">
                        <input type="text" value="Select a country" readonly>
                        <button class="input-icon-right">
                            <svg class="chevron-icon" viewBox="0 0 24 24">
                                <path d="M6 9l6 6 6-6" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Email/Mobile Input Group -->
                <div class="input-group">
                    <label class="input-label">Email address or mobile number</label>
                    <div class="input-wrapper">
                        <input type="text" placeholder="Email address or mobile number">
                    </div>
                </div>

                <!-- Password Input Group -->
                <div class="input-group" style="margin-bottom: 20px;">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password-input" placeholder="Enter password">
                        <button class="input-icon-right" id="toggle-password">
                            <!-- Custom eye icon matching screenshot -->
                            <svg class="eye-icon" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="4"></circle>
                                <circle cx="12" cy="12" r="1" fill="#ff6b6b" stroke="none"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <a href="#" class="forgot-link">Forgot your password?</a>

            </div>
        </div>

        <!-- Bottom Action Button -->
        <div class="bottom-action">
            <div class="action-container">
                <button class="sign-in-btn" id="signInBtn">
                    <span class="btn-text">Sign in</span>
                    <div class="loading-spinner" id="spinner"></div>
                </button>
            </div>
        </div>

        <!-- System Navigation Bar -->
        <div class="nav-bar">
            <!-- Back (U-turn arrow) -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M10 9l-4 4 4 4m-4-4h9a4 4 0 0 0 4-4V5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <!-- Home (Circle) -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="7" fill="none" stroke="#888" stroke-width="2" />
            </svg>
            <!-- Recent (Hamburger/Menu) -->
            <svg class="nav-icon" viewBox="0 0 24 24">
                <line x1="4" y1="8" x2="20" y2="8" />
                <line x1="4" y1="16" x2="20" y2="16" />
            </svg>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const togglePasswordBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password-input');
            const emailInput = document.querySelector('input[placeholder="Email address or mobile number"]');
            const signInBtn = document.getElementById('signInBtn');
            const spinner = document.getElementById('spinner');
            const btnText = signInBtn.querySelector('.btn-text');

            function validateForm() {
                const isFormFull = emailInput.value.length > 0 && passwordInput.value.length > 0;
                signInBtn.classList.toggle('active', isFormFull);
                signInBtn.style.cursor = isFormFull ? 'pointer' : 'default';
            }

            emailInput.addEventListener('input', validateForm);
            passwordInput.addEventListener('input', validateForm);

            togglePasswordBtn.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePasswordBtn.style.opacity = type === 'text' ? '0.5' : '1';
            });

            signInBtn.addEventListener('click', (e) => {
                if (!signInBtn.classList.contains('active')) return;

                // Show loading
                btnText.style.display = 'none';
                spinner.style.display = 'block';
                signInBtn.style.pointerEvents = 'none';

                setTimeout(() => {
                    window.location.href = 'ai_studio_code (1).html';
                }, 1500);
            });

            // Add navigation to country selection
            const countrySelectBtn = document.querySelector('.input-wrapper');
            if (countrySelectBtn) {
                countrySelectBtn.addEventListener('click', () => {
                    window.location.href = 'ai_studio_code.html';
                });
            }

            // Add navigation to back button
            const backBtn = document.querySelector('.header .icon-btn:first-child');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    window.location.href = 'ai_studio_code (1).html';
                });
            }
        });
    </script>

</body>

</html>
