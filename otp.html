<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Equity Mobile</title>
    <style>
        :root {
            --primary: #8c1d1b;
            --bg: #1e1b18;
            --text: #ffffff;
            --input-bg: #262422;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            animation: fadeInBody 0.6s ease-out;
        }

        @keyframes fadeInBody {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .mobile-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 900px;
            background-color: var(--bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 500px) {
            .mobile-container {
                height: 90vh;
                border-radius: 30px;
            }
        }

        .header {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 5px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 15px;
            color: #aaa;
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            background-color: var(--input-bg);
            border: 2px solid #4a4846;
            border-radius: 12px;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            outline: none;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(140, 29, 27, 0.2);
        }

        .resend-text {
            font-size: 14px;
            color: #888;
            margin-bottom: 30px;
        }

        .resend-link {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .verify-btn {
            width: 100%;
            padding: 18px;
            background-color: #383633;
            color: #9e9c99;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: default;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .verify-btn.active {
            background-color: var(--primary);
            color: #fff;
            cursor: pointer;
        }

        .verify-btn.active:active {
            transform: scale(0.98);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='pin.html'">
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6" />
                </svg>
            </button>
            <div style="font-weight: 600;">OTP Verification</div>
            <div style="width: 34px;"></div>
        </div>

        <div class="content">
            <h1 class="title">Verification Code</h1>
            <p class="subtitle">Please enter the 6-digit code sent to your mobile number ending in **14</p>

            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
                <input type="text" class="otp-input" maxlength="1" pattern="\d*" inputmode="numeric">
            </div>

            <p class="resend-text">Didn't receive the code? <span class="resend-link">Resend Code</span></p>

            <button class="verify-btn" id="verifyBtn">
                <span class="btn-text">Verify & Continue</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verifyBtn');
            const spinner = document.getElementById('spinner');
            const btnText = verifyBtn.querySelector('.btn-text');

            inputs[0].focus();

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.inputType === 'deleteContentBackward') return;

                    if (input.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    checkOTP();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            function checkOTP() {
                const otp = Array.from(inputs).map(i => i.value).join('');
                if (otp.length === 6) {
                    verifyBtn.classList.add('active');
                    verifyBtn.style.cursor = 'pointer';
                } else {
                    verifyBtn.classList.remove('active');
                    verifyBtn.style.cursor = 'default';
                }
            }

            verifyBtn.addEventListener('click', () => {
                if (!verifyBtn.classList.contains('active')) return;

                btnText.style.display = 'none';
                spinner.style.display = 'block';
                verifyBtn.style.pointerEvents = 'none';

                setTimeout(() => {
                    window.location.href = 'ai_studio_code (1).html';
                }, 1500);
            });
        });
    </script>
</body>

</html>
