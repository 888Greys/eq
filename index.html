<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity Loan - Splash</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #8c1d1b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            padding: 20px;
            animation: fadeInBody 0.6s ease-out;
        }

        @keyframes fadeInBody {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        .logo {
            width: 150px;
            margin-bottom: 20px;
        }

        .brand-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loader {
            margin-top: 30px;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="splash-container">
        <svg class="logo" viewBox="0 0 100 35" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 32 L0 15 L18 15 L50 0 L100 24 L100 32 L50 8 L22 21 L22 32 Z" fill="#ffffff" />
        </svg>
        <div class="brand-text">EQUITY</div>
        <div style="display:flex; justify-content:center;">
            <div class="loader"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'calculator.html';
        }, 2500);
    </script>
</body>

</html>
